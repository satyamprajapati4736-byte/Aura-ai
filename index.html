        @keyframes scanline {

        }
        .scanline::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(16, 185, 129, 0.2), transparent);
            height: 10px;
            animation: scanline 4s linear infinite;
        }
    </style>
<script>

      ...window.process?.env
